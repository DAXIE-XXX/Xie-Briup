<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI识别系统 - 首页</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            animation: fadeIn 0.5s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            color: #333;
            font-size: 36px;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
            font-size: 18px;
        }

        .nav-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .nav-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .nav-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.6);
        }

        .nav-card .icon {
            font-size: 48px;
            margin-bottom: 15px;
        }

        .nav-card h2 {
            font-size: 24px;
            margin-bottom: 10px;
        }

        .nav-card p {
            font-size: 14px;
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 AI识别系统</h1>
            <p>支持多种AI模型的识别服务</p>
        </div>

        <div class="nav-cards">
            <a href="/building_recognition" class="nav-card">
                <div class="icon">🏢</div>
                <h2>建筑物识别</h2>
                <p>使用YOLO模型检测建筑物</p>
            </a>

            <a href="/car_recognition" class="nav-card">
                <div class="icon">🚗</div>
                <h2>车牌识别</h2>
                <p>使用YOLO+OCR识别车牌号码</p>
            </a>

            <a href="/get_model_html" class="nav-card">
                <div class="icon">📤</div>
                <h2>模型上传</h2>
                <p>上传和管理AI模型</p>
            </a>
        </div>
    </div>
</body>
</html>
